<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Raffle</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:#0a0a0a;
    color:#fff;
    margin:0;
}

h1{
    text-align:center;
    margin:20px 10px;
    font-size:28px;
    background:linear-gradient(90deg,gold,#fff,gold);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}


.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    padding:20px;
}


.card{
    background:#121212;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(255,215,0,0.15);
    transition:.3s;
    animation:fadeIn .6s ease forwards;
}


.card:hover{
    transform:scale(1.03);
}


img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}


.card h3{
    color:#00e6ff;
    margin:10px 0;
}


.card p{
    color:#bbb;
}


button{
    margin-top:12px;
    padding:12px;
    width:100%;
    border:none;
    background:linear-gradient(45deg,gold,#ffcc00);
    color:#000;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}


.skeleton{
    height:300px;
    border-radius:12px;
    background:#222;
    animation:pulse 1.5s infinite;
}


@keyframes pulse{
    50%{
        opacity:.5;
    }
}


@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}


@media(max-width:600px){

h1{
font-size:22px;
}

.card{
padding:12px;
}

img{
height:150px;
}

}

</style>

</head>


<body>


<h1>
Luxury Raffle Marketplace
</h1>


<div class="container" id="products"></div>



<script>


const API_URL = "https://raffle-site-x3qw.onrender.com";



async function loadProducts(){


const container=document.getElementById("products");


container.innerHTML=`

<div class="skeleton"></div>
<div class="skeleton"></div>
<div class="skeleton"></div>

`;



try{


const res = await fetch(
`${API_URL}/products`
);


const data = await res.json();



setTimeout(()=>{


container.innerHTML=data.map(p=>{


const remaining =
p.totalTickets - p.soldTickets;



return `

<div class="card">


<img src="${API_URL}${p.image}">


<h3>
${p.name}
</h3>


<p>
${p.description}
</p>


<p>
<b>KSh ${p.price}</b> per ticket
</p>


<p style="color:gold;">
${remaining} tickets left
</p>


<button onclick="buyTicket(${p.id})">
Buy Ticket
</button>


</div>

`;


}).join("");



},600);



}

catch(error){


container.innerHTML=`

<h2>
Unable to load products
</h2>

<p>
Please try again later.
</p>

`;


console.log(error);


}


}





async function buyTicket(productId){



const phone =
prompt("Enter phone (2547XXXXXXXX)");



if(!phone)return;



const quantity =
prompt("How many tickets?");



if(!quantity)return;



try{


const res = await fetch(

`${API_URL}/mpesa/stkpush`,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

phone,

productId,

quantity:Number(quantity)

})

}

);



const data =
await res.json();



if(data.ResponseCode==="0"){


alert(
"📲 Payment prompt sent. Check your phone."
);


}

else{


alert(
"Payment request failed"
);


}



}


catch(err){


alert(
"Server connection error"
);


console.log(err);


}


}



loadProducts();


</script>


</body>
</html>
