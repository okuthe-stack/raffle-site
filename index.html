<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Raffle</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background:#0a0a0a;
    color:#fff;
    margin:0;
}

/* HEADER */
h1{
    text-align:center;
    margin:20px 10px;
    font-size:28px;
    background: linear-gradient(90deg, gold, #fff, gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* CONTAINER */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#121212;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(255,215,0,0.15);
    transition:0.3s;
    animation:fadeIn 0.6s ease forwards;
}

.card:hover{
    transform:scale(1.03);
}

/* IMAGE */
img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

/* PRODUCT NAME */
.card h3{
    color:#00e6ff;
    margin:10px 0;
    font-size:18px;
}

/* TEXT */
.card p{
    color:#bbb;
    font-size:14px;
}

/* BUTTON */
button{
    margin-top:12px;
    padding:12px;
    width:100%;
    border:none;
    background:linear-gradient(45deg,gold,#ffcc00);
    color:#000;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

/* LOADING */
.skeleton{
    height:300px;
    border-radius:12px;
    background: linear-gradient(90deg,#1a1a1a,#2a2a2a,#1a1a1a);
    background-size:200% 100%;
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* MOBILE TWEAKS */
@media (max-width:600px){

    h1{
        font-size:22px;
    }

    .card{
        padding:12px;
    }

    img{
        height:150px;
    }

    button{
        padding:14px;
        font-size:16px;
    }

}

</style>
</head>

<body>

<h1>Luxury Raffle Marketplace</h1>

<div class="container" id="products"></div>

<script>

async function loadProducts(){

    const container = document.getElementById("products");

    container.innerHTML = `
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    `;

    const res = await fetch("http://localhost:3000/products");
    const data = await res.json();

    setTimeout(()=>{

        container.innerHTML = data.map(p=>{

            const remaining = p.totalTickets - p.soldTickets;

            return `
            <div class="card">

                <img src="http://localhost:3000${p.image}" />

                <h3>${p.name}</h3>

                <p>${p.description}</p>

                <p><b>KSh ${p.price}</b> per ticket</p>

                <p style="color:gold;">
                    ${remaining} tickets left
                </p>

                <button onclick="buyTicket(${p.id})">
                    Buy Ticket
                </button>

            </div>
            `;

        }).join("");

    }, 600);

}

async function buyTicket(productId){

    const phone = prompt("Enter phone (2547XXXXXXXX)");
    if(!phone) return;

    const quantity = prompt("How many tickets?");
    if(!quantity) return;

    try{

        const res = await fetch("http://localhost:3000/mpesa/stkpush",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                phone,
                productId,
                quantity:Number(quantity)
            })
        });

        const data = await res.json();

        if(data.ResponseCode === "0"){
            alert("📲 Payment prompt sent. Check your phone.");
        }else{
            alert("Payment failed");
        }

    }catch(err){
        alert("Server error");
    }

}

loadProducts();

</script>

</body>
</html>
