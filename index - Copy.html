<!DOCTYPE html>
<html>

<head>

<title>Raffle Royale</title>

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#090909;
    color:white;
}

header {
    background:linear-gradient(135deg,#000,#5c4300);
    padding:50px;
    text-align:center;
}

header h1 {
    color:#d4af37;
    font-size:50px;
    margin:0;
}

header p {
    font-size:20px;
}

.container {
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:40px 0;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card {
    background:#161616;
    border:1px solid #d4af37;
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.card img {
    width:230px;
    height:230px;
    object-fit:cover;
    border-radius:20px;
}

.card h2 {
    color:#d4af37;
    font-size:30px;
}

.description {
    color:#ddd;
}

.price {
    font-size:24px;
    color:#d4af37;
    font-weight:bold;
}

.progress-container {
    background:#333;
    height:15px;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar {
    background:#d4af37;
    height:100%;
}

input {
    width:80%;
    padding:12px;
    border-radius:25px;
    border:none;
    margin:15px;
}

button {
    background:#d4af37;
    border:none;
    padding:15px 35px;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:white;
}

</style>

</head>


<body>


<header>

<h1>Raffle Royale</h1>

<p>
Luxury prizes. Affordable tickets. Your chance to win.
</p>

</header>


<div class="container">

<h2>Available Luxury Draws</h2>

<div id="products" class="products"></div>

</div>



<script>

const API="http://localhost:3000";


async function loadProducts(){


const response = await fetch(API + "/products");


const products = await response.json();


const container = document.getElementById("products");


container.innerHTML="";


products.forEach(product=>{


let soldPercentage =
(product.soldTickets / product.totalTickets) * 100;



container.innerHTML += `


<div class="card">


<img src="${API}${product.image}">


<h2>${product.name}</h2>


<p class="description">

${product.description}

</p>


<p class="price">

KSh ${product.price} per ticket

</p>


<p>

Tickets Sold:

${product.soldTickets}/${product.totalTickets}

</p>


<div class="progress-container">

<div class="progress-bar"

style="width:${soldPercentage}%">

</div>

</div>


<p>

${product.totalTickets - product.soldTickets}

tickets remaining

</p>


<input

id="name-${product.id}"

placeholder="Enter your name"


>


<br>


<button onclick="buyTicket(${product.id})">

ENTER DRAW

</button>


</div>


`;


});


}




async function buyTicket(productId){


const name =
document.getElementById(
"name-"+productId
).value;



if(!name){

alert("Please enter your name");

return;

}



const response = await fetch(API + "/buy",{


method:"POST",


headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

name:name,

productId:productId

})


});



const data = await response.json();


alert(data.message);


loadProducts();


}



loadProducts();


</script>


</body>

</html>
